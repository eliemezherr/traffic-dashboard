<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Traffic Congestion Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #111116;
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      padding: 32px 28px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; }
    .title { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .badge {
      font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
      padding: 3px 8px; border-radius: 4px; letter-spacing: 0.06em; display: inline-block; vertical-align: middle; margin-left: 10px;
    }
    .badge.live { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge.paused { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }
    .subtitle { font-family: 'DM Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 4px; }
    .btn-pause {
      font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 16px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #f0f0f0;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-pause:hover { background: rgba(255,255,255,0.1); }
    .stats-strip {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 24px;
      padding: 16px 20px; background: rgba(255,255,255,0.02); border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .stat { text-align: center; }
    .stat-label {
      font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
    }
    .stat-value { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .stat-sub { font-family: 'DM Mono', monospace; font-size: 10px; margin-top: 2px; color: rgba(255,255,255,0.25); }
    .stat-sub.rush { color: #f87171; }
    .stat-sub.alert { color: #fbbf24; }
    .timeline-label {
      font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; margin-top: 20px;
    }
    .timeline { display: flex; gap: 2px; align-items: flex-end; height: 32px; }
    .timeline-bar { flex: 1; border-radius: 3px; transition: height 0.3s ease, background 0.3s ease; position: relative; }
    .timeline-time {
      display: flex; justify-content: space-between; margin-top: 4px;
      font-family: 'DM Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.2);
    }
    .timeline-current {
      position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      font-family: 'DM Mono', monospace; font-size: 10px; color: #93c5fd; white-space: nowrap;
    }
    .zones-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 28px; }
    .zone-card {
      border-radius: 16px; padding: 24px 28px; display: flex; flex-direction: column; gap: 16px;
      transition: border-color 0.4s, background 0.4s;
    }
    .zone-card.congested {
      background: linear-gradient(135deg, rgba(239,68,68,0.12) 0%, rgba(30,30,36,1) 100%);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .zone-card.normal {
      background: linear-gradient(135deg, rgba(34,197,94,0.08) 0%, rgba(30,30,36,1) 100%);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .zone-header { display: flex; justify-content: space-between; align-items: center; }
    .zone-name { font-weight: 700; font-size: 18px; letter-spacing: -0.02em; }
    .zone-id { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.35); margin-left: 18px; }
    .dot {
      display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; vertical-align: middle;
    }
    .dot.red { background: #ef4444; box-shadow: 0 0 8px 2px rgba(239,68,68,0.5); animation: pulse 1.2s infinite; }
    .dot.green { background: #22c55e; box-shadow: 0 0 8px 2px rgba(34,197,94,0.4); }
    .prediction-badge {
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 6px; letter-spacing: 0.05em;
    }
    .prediction-badge.congested { background: rgba(239,68,68,0.15); color: #f87171; }
    .prediction-badge.normal { background: rgba(34,197,94,0.12); color: #4ade80; }
    .zone-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .metric-label {
      font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
    }
    .metric-value { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .metric-unit { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.35); margin-left: 2px; }
    .metric-value.danger { color: #f87171; }
    .metric-value.warn { color: #fbbf24; }
    .metric-value.ok { color: #4ade80; }
    .load-bar { width: 100%; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.07); overflow: hidden; }
    .load-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .charts-section {
      margin-top: 28px; padding: 20px 24px; background: rgba(255,255,255,0.02);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.04);
    }
    .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 16px; }
    .chart-zone-name { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
    .footer {
      margin-top: 24px; text-align: center; font-family: 'DM Mono', monospace;
      font-size: 10px; color: rgba(255,255,255,0.15);
    }
    @media (max-width: 640px) {
      .zones-grid { grid-template-columns: 1fr; }
      .stats-strip { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const ZONES = [
  { id: "ZoneA", name: "Kfarshima", capacity: 60 },
  { id: "ZoneB", name: "Bseba", capacity: 80 },
  { id: "ZoneC", name: "Baabda", capacity: 50 },
  { id: "ZoneD", name: "Hadath", capacity: 70 },
];
const RUSH_HOURS = [7, 8, 9, 17, 18, 19];

let simulatedHour = 0;
let totalMessages = 0;
let isRunning = true;
let tick = 0;
const speedHistory = {};
ZONES.forEach(z => speedHistory[z.id] = []);

function generateZoneData(hour) {
  const isRush = RUSH_HOURS.includes(hour);
  return ZONES.map(zone => {
    let vehicleCount, avgSpeed, isCongested;
    if (isRush) {
      vehicleCount = Math.round(zone.capacity * (0.55 + Math.random() * 0.45));
      const ratio = vehicleCount / zone.capacity;
      if (ratio > 0.75 && Math.random() > 0.25) {
        avgSpeed = Math.round(5 + Math.random() * 23);
        isCongested = true;
      } else {
        avgSpeed = Math.round(35 + Math.random() * 40);
        isCongested = false;
      }
    } else {
      vehicleCount = Math.round(zone.capacity * (0.1 + Math.random() * 0.4));
      avgSpeed = Math.round(50 + Math.random() * 65);
      isCongested = false;
    }
    const congestionRatio = Math.round((vehicleCount / zone.capacity) * 100);
    return { ...zone, vehicleCount, avgSpeed, isCongested, congestionRatio, prediction: isCongested ? "CONGESTED" : "NORMAL" };
  });
}

function renderSpeedChart(history, containerId) {
  const el = document.getElementById(containerId);
  if (!el || history.length < 2) { if(el) el.innerHTML = '<svg width="100%" height="60"></svg>'; return; }
  const maxSpeed = 120, w = 280, h = 60;
  const lastVal = history[history.length - 1];
  const lineColor = lastVal < 30 ? "#ef4444" : lastVal < 60 ? "#eab308" : "#22c55e";
  const points = history.map((val, i) => {
    const x = (i / (history.length - 1)) * w;
    const y = h - (val / maxSpeed) * h;
    return `${x},${y}`;
  });
  el.innerHTML = `
    <svg width="${w}" height="${h}" style="overflow:visible">
      <defs><linearGradient id="g-${containerId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${lineColor}" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="${lineColor}" stop-opacity="0"/>
      </linearGradient></defs>
      <polygon points="0,${h} ${points.join(" ")} ${w},${h}" fill="url(#g-${containerId})"/>
      <polyline points="${points.join(" ")}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
}

function render(zoneData) {
  const congestedCount = zoneData.filter(z => z.isCongested).length;
  const isRushNow = RUSH_HOURS.includes(simulatedHour);
  const hourStr = String(simulatedHour).padStart(2, "0") + ":00";

  let html = `
    <div class="header-row">
      <div>
        <div><span class="title">Traffic Congestion</span><span class="badge ${isRunning ? 'live' : 'paused'}">${isRunning ? 'LIVE' : 'PAUSED'}</span></div>
        <div class="subtitle">Smart Prediction Dashboard — Mont-Liban Region</div>
      </div>
      <button class="btn-pause" id="toggleBtn">${isRunning ? '⏸ Pause' : '▶ Resume'}</button>
    </div>

    <div class="stats-strip">
      <div class="stat">
        <div class="stat-label">Simulated Time</div>
        <div class="stat-value">${hourStr}</div>
        <div class="stat-sub ${isRushNow ? 'rush' : ''}">${isRushNow ? 'RUSH HOUR' : 'Normal'}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Zones Congested</div>
        <div class="stat-value">${congestedCount} / ${ZONES.length}</div>
        <div class="stat-sub ${congestedCount > 0 ? 'alert' : ''}">${congestedCount > 0 ? 'Alert Active' : 'All Clear'}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Messages Sent</div>
        <div class="stat-value">${totalMessages.toLocaleString()}</div>
        <div class="stat-sub">From IoT Hub</div>
      </div>
      <div class="stat">
        <div class="stat-label">Model Status</div>
        <div class="stat-value">Online</div>
        <div class="stat-sub">AutoML Classification</div>
      </div>
    </div>

    <div class="timeline-label">24h Cycle — Red = Rush Hours</div>
    <div class="timeline">`;

  for (let i = 0; i < 24; i++) {
    const isRush = RUSH_HOURS.includes(i);
    const isCurrent = i === simulatedHour;
    const height = isCurrent ? 28 : isRush ? 18 : 10;
    const bg = isCurrent ? "#3b82f6" : isRush ? "rgba(239,68,68,0.35)" : "rgba(255,255,255,0.06)";
    html += `<div class="timeline-bar" style="height:${height}px;background:${bg}" title="${i}:00${isRush ? ' (Rush Hour)' : ''}">`;
    if (isCurrent) html += `<div class="timeline-current">${i}:00</div>`;
    html += `</div>`;
  }

  html += `</div>
    <div class="timeline-time"><span>0:00</span><span>6:00</span><span>12:00</span><span>18:00</span><span>23:00</span></div>
    <div class="zones-grid">`;

  zoneData.forEach((z, i) => {
    const speedClass = z.avgSpeed < 30 ? 'danger' : '';
    const loadClass = z.congestionRatio > 75 ? 'danger' : z.congestionRatio > 50 ? 'warn' : 'ok';
    const loadColor = z.congestionRatio > 75 ? '#ef4444' : z.congestionRatio > 50 ? '#eab308' : '#22c55e';
    html += `
      <div class="zone-card ${z.isCongested ? 'congested' : 'normal'}" style="animation:fadeSlideUp 0.5s ease ${i * 0.08}s both">
        <div class="zone-header">
          <div>
            <div><span class="dot ${z.isCongested ? 'red' : 'green'}"></span><span class="zone-name">${z.name}</span></div>
            <div class="zone-id">${z.id}</div>
          </div>
          <div class="prediction-badge ${z.isCongested ? 'congested' : 'normal'}">${z.prediction}</div>
        </div>
        <div class="zone-metrics">
          <div>
            <div class="metric-label">Avg Speed</div>
            <div class="metric-value ${speedClass}">${z.avgSpeed}<span class="metric-unit">km/h</span></div>
          </div>
          <div>
            <div class="metric-label">Vehicles</div>
            <div class="metric-value">${z.vehicleCount}<span class="metric-unit">/ ${z.capacity}</span></div>
          </div>
          <div>
            <div class="metric-label">Load</div>
            <div class="metric-value ${loadClass}">${z.congestionRatio}%</div>
          </div>
        </div>
        <div class="load-bar"><div class="load-fill" style="width:${Math.min(z.congestionRatio, 100)}%;background:${loadColor}"></div></div>
      </div>`;
  });

  html += `</div>
    <div class="charts-section">
      <div class="stat-label">Average Speed Trend (last 30 ticks)</div>
      <div class="charts-grid">`;

  ZONES.forEach(z => {
    html += `<div><div class="chart-zone-name">${z.name}</div><div id="chart-${z.id}"></div></div>`;
  });

  html += `</div></div>
    <div class="footer">Smart Traffic Congestion Prediction System — Azure IoT Hub → Data Lake Gen2 → Azure ML AutoML</div>`;

  document.getElementById("app").innerHTML = html;

  // Render charts
  ZONES.forEach(z => renderSpeedChart(speedHistory[z.id], `chart-${z.id}`));

  // Attach pause button
  document.getElementById("toggleBtn").addEventListener("click", () => {
    isRunning = !isRunning;
    if (isRunning) startLoop();
  });
}

let intervalId;
function startLoop() {
  clearInterval(intervalId);
  intervalId = setInterval(() => {
    if (!isRunning) { clearInterval(intervalId); render(generateZoneData(simulatedHour)); return; }
    tick++;
    simulatedHour = tick % 24;
    totalMessages += 30;
    const data = generateZoneData(simulatedHour);
    data.forEach(z => {
      speedHistory[z.id].push(z.avgSpeed);
      if (speedHistory[z.id].length > 30) speedHistory[z.id].shift();
    });
    render(data);
  }, 2500);
}

// Initial render & start
render(generateZoneData(0));
startLoop();
</script>
</body>
</html>
